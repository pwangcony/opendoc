<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>SAM4S - 문서열기</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'%3E%3C/path%3E%3Cpolyline points='14 2 14 8 20 8'%3E%3C/polyline%3E%3C/svg%3E">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Pretendard Variable"', 'Pretendard', 'sans-serif'] 
                    },
                    colors: { 
                        zinc: { 850: '#1f1f22', 950: '#09090b' } 
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'shake': 'shake 0.4s both',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'shimmer': 'shimmer 2.5s linear infinite',
                    },
                    keyframes: {
                        float: { 
                            '0%, 100%': { transform: 'translateY(0)' }, 
                            '50%': { transform: 'translateY(-5px)' } 
                        },
                        shake: { 
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, 
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, 
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, 
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } 
                        },
                        fadeIn: { 
                            '0%': { opacity: '0', transform: 'translateY(10px)' }, 
                            '100%': { opacity: '1', transform: 'translateY(0)' } 
                        },
                        shimmer: { 
                            '0%': { backgroundPosition: '200% 0' }, 
                            '100%': { backgroundPosition: '-200% 0' } 
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @charset "UTF-8";

        select {
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            text-align: left;
        }

        .selected-center {
            text-align: center !important;
            text-align-last: center !important;
        }
        
        option {
            background-color: #18181b;
            color: #e4e4e7;
            padding: 16px;
            text-align: left !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        #weatherWidget {
            touch-action: none;
            user-select: none;
        }
        .drag-handle {
            cursor: move;
        }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen p-4 font-sans text-zinc-100 selection:bg-blue-500/30 overflow-hidden">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-blue-600/10 blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-indigo-600/10 blur-[100px]"></div>
    </div>
    
    <main class="w-full max-w-[420px] bg-zinc-900/60 backdrop-blur-2xl border border-zinc-800/50 rounded-[2rem] p-8 shadow-[0_8px_32px_rgba(0,0,0,0.4)] relative z-10 animate-fade-in flex flex-col gap-8 text-center">
        
        <header class="flex flex-col items-center justify-center space-y-3">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.3)] animate-float">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">SAM4S</h1>
                <p class="text-[13px] font-medium text-zinc-400 mt-1">사내 문서 열람 포털</p>
            </div>
        </header>

        <div class="space-y-6">
            <div class="relative group" id="selectContainer">
                <select id="linkSelect" class="w-full h-[56px] bg-zinc-850/50 border border-zinc-700/60 rounded-xl px-5 text-[15px] font-medium text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all cursor-pointer relative z-10 bg-transparent">
                    <option value="" disabled selected hidden></option>
                    <option value="doc1">PC-POS 모델 채번규정</option>
                    <option value="doc2">KIOSK 모델 채번규정</option>
                    <option value="doc3">설계변경통보서</option>
                    <option value="doc4">승인원</option>
                    <option value="doc5">예외자재청구서</option>
                    <option value="doc6">ECN</option>
                    <option value="doc7">SVC PO검토파일</option>
                    <option value="doc8">해외우편발송관리대장</option>
                    <option value="doc9">부품(금형) 개발 관리양식</option>
                    <option value="doc10">(SA기타-15-0001_S2) 신규거래선 진행현황</option>
                    <option value="doc11">(SA기타-16-0001_S2) ECR 모델코드</option>
                    <option value="doc12">(SA기타-23-0001_S2) 러시아 OL 거래선 바코드 모델코드</option>
                    <option value="doc13">모델명채번 기준서(로그인 필요)</option>
                    <option value="doc14">인증자료(로그인 필요)</option>
                    <option value="doc15">바이어체크리스트(로그인 필요)</option>
                    <option value="doc16">개발문서관리대장(로그인 필요)</option>
                </select>

                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500 group-hover:text-zinc-300 transition-colors z-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>

                <div id="placeholderText" class="absolute inset-y-0 left-5 flex items-center pointer-events-none transition-opacity duration-300 z-0">
                    <span class="bg-gradient-to-r from-zinc-500 via-zinc-100 to-zinc-500 bg-[length:200%_auto] text-transparent bg-clip-text animate-shimmer text-[15px] font-medium">
                        열고 싶은 문서를 선택하세요
                    </span>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="btnOpen" class="w-full h-[52px] rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold text-[15px] flex items-center justify-center gap-2 transition-all duration-300 hover:shadow-[0_0_20px_rgba(79,70,229,0.4)] hover:-translate-y-0.5 active:scale-[0.98]">
                    <span>문서 열기</span>
                </button>
            </div>
        </div>

        <div class="text-center pt-2">
            <span class="text-zinc-600 text-[12px] font-medium tracking-wide">v2.3 DEV SJ</span>
        </div>
    </main>

    <div id="weatherWidget" class="fixed top-10 right-10 w-64 bg-zinc-900/80 backdrop-blur-xl border border-zinc-700/50 rounded-2xl shadow-2xl z-50 animate-fade-in transition-shadow hover:shadow-blue-500/10">

        <div class="drag-handle w-full h-8 flex items-center justify-center group">
            <div class="w-10 h-1 bg-zinc-700 rounded-full group-hover:bg-zinc-500 transition-colors"></div>
        </div>
        
        <div class="px-6 pb-6 space-y-4">

            <div class="text-center">
                <div id="widgetTime" class="text-3xl font-bold tracking-tighter text-white">00:00:00</div>
                <div id="widgetDate" class="text-[11px] text-zinc-500 font-medium uppercase tracking-widest mt-1">LOADING DATE...</div>
            </div>

            <div class="h-px bg-zinc-800/50 w-full"></div>

            <div class="flex items-center justify-between">
                <div class="flex flex-col">
                    <span id="widgetLocation" class="text-[13px] font-semibold text-zinc-300">위치 확인 중...</span>
                    <span id="widgetWeatherDesc" class="text-[11px] text-zinc-500 capitalize">정보를 불러오는 중</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="widgetTemp" class="text-xl font-bold text-white">--°</span>
                    <div id="weatherIcon" class="text-blue-400">
                    
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 19.07-1.41-1.41"/><path d="M12 20v2"/><path d="m6.34 17.66-1.41 1.41"/><path d="M2 12h2"/><path d="m7.76 7.76-1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const linkMap = { 
            'doc1': 'aHR0cHM6Ly90aW55dXJsLmNvbS9iZGVrdTRubg==', 
            'doc2': 'aHR0cHM6Ly90aW55dXJsLmNvbS8zc25ma3o0ag==', 
            'doc3': 'aHR0cHM6Ly9zaG9ydHVybC5hdC9kS2JIQw==', 
            'doc4': 'aHR0cHM6Ly9zaG9ydHVybC5hdC9CRU1BWg==', 
            'doc5': 'aHR0cHM6Ly9zaG9ydHVybC5hdC9SRjVJRg==', 
            'doc6': 'aHR0cHM6Ly9zaG9ydHVybC5hdC91Ylo3YQ==', 
            'doc7': 'aHR0cHM6Ly9zaG9ydHVybC5hdC8zdThsNQ==', 
            'doc8': 'aHR0cHM6Ly90aW55dXJsLmNvbS80NDJ4M2VuZg==', 
            'doc9': 'aHR0cHM6Ly90aW55dXJsLmNvbS81bjdjaGhidg==', 
            'doc10': 'aHR0cHM6Ly90aW55dXJsLmNvbS80ODJrMm0yMg==', 
            'doc11': 'aHR0cHM6Ly90aW55dXJsLmNvbS8yNTU1enlkdQ==', 
            'doc12': 'aHR0cHM6Ly90aW55dXJsLmNvbS8zY2Nobjd2OQ==', 
            'doc13': 'aHR0cHM6Ly90aW55dXJsLmNvbS8zdGh1aDQ4eQ==', 
            'doc14': 'aHR0cHM6Ly90aW55dXJsLmNvbS8zODIzZndrZg==', 
            'doc15': 'aHR0cHM6Ly90aW55dXJsLmNvbS8yczR5eGR3Mg==', 
            'doc16': 'aHR0cHM6Ly90aW55dXJsLmNvbS93N3A5N3Uzag==' 
        };

        // 보안 설정
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || 
                (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('linkSelect');
            const placeholder = document.getElementById('placeholderText');
            const btnOpen = document.getElementById('btnOpen');

            select.addEventListener('change', (e) => {
                if(e.target.value !== "") {
                    placeholder.style.opacity = '0';
                    select.classList.add('selected-center');
                    select.classList.remove('border-red-500', 'ring-red-500/50');
                }
            });

            btnOpen.addEventListener('click', () => {
                const key = select.value;
                if (key && linkMap[key]) {
                    window.open(atob(linkMap[key]), '_blank');
                } else {
                    select.classList.add('animate-shake', 'border-red-500', 'ring-2', 'ring-red-500/50');
                    setTimeout(() => select.classList.remove('animate-shake'), 400);
                    select.focus();
                }
            });
            
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                
                document.getElementById('widgetTime').textContent = `${h}:${m}:${s}`;
                
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
                document.getElementById('widgetDate').textContent = now.toLocaleDateString('ko-KR', options);
            }
            setInterval(updateClock, 1000);
            updateClock();

            async function fetchWeatherData() {
                try {
                    const geoRes = await fetch('https://ipapi.co/json/');
                    const geoData = await geoRes.json();
                    const city = geoData.city || 'Seoul';
                    const country = geoData.country_name || 'South Korea';
                    
                    document.getElementById('widgetLocation').textContent = `${city}, ${geoData.country_code}`;

                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geoData.latitude}&longitude=${geoData.longitude}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    
                    const temp = Math.round(weatherData.current_weather.temperature);
                    const code = weatherData.current_weather.weathercode;

                    document.getElementById('widgetTemp').textContent = `${temp}°`;
                    
                    const weatherStatus = {
                        0: "맑음", 1: "주로 맑음", 2: "부분적 흐림", 3: "흐림",
                        45: "안개", 48: "안개", 51: "가랑비", 61: "비", 
                        71: "눈", 95: "뇌우"
                    };
                    document.getElementById('widgetWeatherDesc').textContent = weatherStatus[code] || "정보 없음";
                    
                } catch (error) {
                    console.error('날씨 정보를 불러오는데 실패했습니다.', error);
                    document.getElementById('widgetLocation').textContent = "위치 확인 불가";
                }
            }
            fetchWeatherData();
            const widget = document.getElementById('weatherWidget');
            const handle = widget.querySelector('.drag-handle');
            let isDragging = false;
            let offset = { x: 0, y: 0 };

            handle.addEventListener('mousedown', (e) => {
                isDragging = true;
                offset.x = e.clientX - widget.getBoundingClientRect().left;
                offset.y = e.clientY - widget.getBoundingClientRect().top;
                widget.classList.add('shadow-blue-500/20');
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                let x = e.clientX - offset.x;
                let y = e.clientY - offset.y;

                const maxX = window.innerWidth - widget.offsetWidth - 10;
                const maxY = window.innerHeight - widget.offsetHeight - 10;
                
                x = Math.max(10, Math.min(x, maxX));
                y = Math.max(10, Math.min(y, maxY));

                widget.style.left = `${x}px`;
                widget.style.top = `${y}px`;
                widget.style.right = 'auto';
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                widget.classList.remove('shadow-blue-500/20');
            });

            handle.addEventListener('touchstart', (e) => {
                isDragging = true;
                const touch = e.touches[0];
                offset.x = touch.clientX - widget.getBoundingClientRect().left;
                offset.y = touch.clientY - widget.getBoundingClientRect().top;
            });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const touch = e.touches[0];
                let x = touch.clientX - offset.x;
                let y = touch.clientY - offset.y;
                widget.style.left = `${x}px`;
                widget.style.top = `${y}px`;
                widget.style.right = 'auto';
            });

            document.addEventListener('touchend', () => isDragging = false);
        });
    </script>
</body>
</html>
